services:
  frontend:
    image: basilisk96/self-rag-frontend:1.0
    container_name: webapp
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_started

    restart: unless-stopped

  backend:
    image: basilisk96/self-rag-backend:1.0
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_started
      mongo:
        condition: service_started
      qdrant:
        condition: service_started

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"